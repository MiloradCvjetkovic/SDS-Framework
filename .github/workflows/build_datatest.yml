name: Build DataTest example
on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/build_datatest.yml
      - 'template/**'
      - 'layer/**'
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET_TYPE:  STM32H735G-DK
  TARGET_BOARD: STM32H735G-DK
# TARGET_LAYER: $SolutionDir()$/../../../.ci/Board/Board.clayer.yml

jobs:
  Build:                                # Install tools, build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        solution: [
          {name: FileSystem, dir: SDS_FileSystem, layer_sdsio: ./layer/sdsio/filesystem },
          {name: Network,    dir: SDS_Network   , layer_sdsio: ./layer/sdsio/network    },
          {name: USB,        dir: SDS_USB       , layer_sdsio: ./layer/sdsio/usb        }
        ]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Install tools
        uses: ARM-software/cmsis-actions/vcpkg@v1
        with:
          config: "./.ci/vcpkg-configuration.json"

      - name: Activate Arm tool license
        uses: ARM-software/cmsis-actions/armlm@v1

      - name: Initialize CMSIS pack root folder
        run: |
          cpackget init https://www.keil.com/pack/index.pidx
          cpackget update-index

      - name: Install required publicly released CMSIS packs
        run: |
          cpackget add Keil.MDK-Middleware -a
          cpackget add MDK-Packs.IoT_Socket -a
          cpackget add ARM.CMSIS-Driver_STM32 -a
          cpackget add Keil.STM32H7xx_DFP -a
          cpackget add Keil.STM32H735G-DK_BSP -a

      - name: Use repository version of this CMSIS pack instead of released one
        run: |
          cpackget add ./ARM.SDS.pdsc

      - name: Copy template to ${{ matrix.solution.dir }} folder
        run: |
          mkdir -p ./${{ matrix.solution.dir }}
          cp -r ./template/. ./${{ matrix.solution.dir }}/

      - name: Copy ${{ env.TARGET_BOARD }} layer to template/Board/${{ env.TARGET_BOARD }}
        run: |
          set -x
          mkdir -p ./template/Board/$TARGET_BOARD
          cp -r /home/runner/.cache/arm/packs/Keil/STM32H735G-DK_BSP/3.0.0/Layers/Default/. ./template/Board/$TARGET_BOARD/
          cp -r "$(find /home/runner/.cache/arm/packs/Keil/$TARGET_BOARD -type f -name "Board.clayer.yml" -exec dirname {} \; | head -n 1)" ./template/Board/$TARGET_BOARD/
          ls -a -R template/Board/$TARGET_BOARD/
#         ls -a -R /home/runner/.cache/arm/packs/Keil/STM32H735G-DK_BSP/3.0.0/
#         ls -a -R ./template/Board/STM32H735G-DK/

      # - name: Copy SDSIO layers to template/sdsio
      #   run: |
      #     cp -r ./layer/ ./template/sdsio/

      # - name: Setup board layer
      #   working-directory: ./template/Board
      #   run: |
      #     pwd
      #     echo $CMSIS_PACK_ROOT
      #     echo ~
      #     ls /home/runner/.cache/arm/packs
#          sed -i "s|- type: ${Name}|&\n    - type: $TARGET_TYPE\n      board: $TARGET_BOARD\n      variables:\n      - Board-Layer: $SolutionDir()$/Board/STM32H735G-DK/Board.clayer.yml\n      - Board-Layer: $SolutionDir()$/Board/STM32H735G-DK/Board.clayer.yml\n      - SDSIO-Layer: $SolutionDir()$/sdsio/network/sdsio_ethernet.clayer.yml|" ./Examples/USB/Device/USB_Device.csolution.yml

      # - name: Build DataTest example
